worker_processes 1;
pid /tmp/nginx.pid;
error_log /tmp/nginx-error.log warn;

events {
  worker_connections 128;
}

http {
  access_log off;
  client_body_temp_path /tmp/nginx-client;
  proxy_temp_path /tmp/nginx-proxy;
  fastcgi_temp_path /tmp/nginx-fastcgi;
  uwsgi_temp_path /tmp/nginx-uwsgi;
  scgi_temp_path /tmp/nginx-scgi;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 0.0.0.0:9222;

    location / {
      proxy_pass http://127.0.0.1:9223;
      proxy_http_version 1.1;
      proxy_set_header Host localhost;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 1h;

      # Chromium emits a loopback WebSocket URL because its debugger is
      # intentionally bound to loopback. Rewrite only that endpoint hostname;
      # the WebSocket itself still traverses this internal-only reverse proxy.
      sub_filter_once off;
      sub_filter_types application/json;
      sub_filter 'ws://localhost:9223' 'ws://$http_host';
      sub_filter 'ws://127.0.0.1:9223' 'ws://$http_host';
      sub_filter 'ws://localhost/' 'ws://$http_host/';
      sub_filter 'ws://127.0.0.1/' 'ws://$http_host/';
    }
  }
}
