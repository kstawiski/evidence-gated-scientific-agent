# Public-web-only egress for the managed research browser. The browser network
# is internal, so this fixed proxy is its only route outside the container.
http_port 3128
visible_hostname evidence-bench-browser-egress
pid_filename /tmp/squid.pid
coredump_dir /tmp
cache deny all
access_log none
cache_log /dev/stderr

acl CONNECT method CONNECT
acl safe_http port 80
acl safe_https port 443
acl local_names dstdomain localhost .local
acl non_public dst 0.0.0.0/8 10.0.0.0/8 100.64.0.0/10 127.0.0.0/8
acl non_public dst 169.254.0.0/16 172.16.0.0/12 192.0.0.0/24 192.0.2.0/24
acl non_public dst 192.88.99.0/24 192.168.0.0/16 198.18.0.0/15
acl non_public dst 198.51.100.0/24 203.0.113.0/24 224.0.0.0/4 240.0.0.0/4
acl non_public dst ::1/128 2001:db8::/32
acl non_public dst fc00::/7 fe80::/10 ff00::/8

http_access deny local_names
http_access deny non_public
http_access deny CONNECT !safe_https
http_access allow CONNECT safe_https
http_access allow safe_http
http_access deny all
